<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Desenho Técnico - RA</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8f9fa; }
        model-viewer { width: 100%; height: 90vh; background-color: #ffffff; }
        h1 { height: 5vh; font-size: 1.1rem; margin: 10px 0; color: #333; text-align: center; }
    </style>
</head>
<body>

    <h1>Projeção Ortogonal - rotacione a peça ou use a Realidade Aumentada</h1>

    <model-viewer 
        src="peca.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1" 
        alt="Peça 3D para exercício de Desenho Técnico">
    </model-viewer>

</body>
</html>
